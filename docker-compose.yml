version: '3.8'
services:
  rest_api_container:
    container_name: rest_api_container
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - recommendations_db

  background_worker_container:
    container_name: background_worker_container
    build:
      context: .
      dockerfile: Dockerfile_celery
    command: celery -A celery_app.tasks worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
      - recommendations_db

  redis:
    image: "redis:alpine"

  recommendations_db:
    container_name: recommendations_db
    image: "postgres:13"
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: recommendations
      POSTGRES_USER: ${DB_USER:-recommendations_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
