version: '3.8'

services:
  test_db:
    image: postgres:13
    environment:
      POSTGRES_DB: test_recommendations
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # In-memory for speed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_recommendations"]
      interval: 5s
      timeout: 5s
      retries: 5

  test_redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  test_runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TEST_DATABASE_URL=postgresql://test:test@test_db:5432/test_recommendations
      - DATABASE_URL=postgresql://test:test@test_db:5432/test_recommendations
      - SECRET_KEY=test-secret-key-for-testing-only
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ALGORITHM=HS256
      - CELERY_BROKER_URL=redis://test_redis:6379/0
      - ENVIRONMENT=development
    volumes:
      - .:/app
    depends_on:
      test_db:
        condition: service_healthy
      test_redis:
        condition: service_healthy
    command: pytest tests/ -v --tb=short
